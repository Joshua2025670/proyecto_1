<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="/plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition register-page">
<div class="register-box">
  <div class="register-logo">
    <h2>Enfrenta un nuevo reto</h2>
    <h6>Tu nos inspiras</h6>
  </div>

  <div class="card">
    <div class="card-body register-card-body">
      <p class="login-box-msg">Register a new membership</p>

      <form id="formRegistroAspirante">
        <label>Nombre</label>
        <div class="input-group mb-3">
          <input id="nombreR" type="text" class="form-control" placeholder="Nombre" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
        </div>

        <label>Teléfono (10 dígitos)</label>
        <div class="input-group mb-3">
          <input id="telR" type="text" maxlength="10" class="form-control" placeholder="Teléfono" required pattern="\d{10}" title="Debe contener exactamente 10 dígitos numéricos">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-phone"></span>
            </div>
          </div>
        </div>

        <label>Email</label>
        <div class="input-group mb-3">
          <input id="emailR" type="email" class="form-control" placeholder="Email" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-envelope"></span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Selecciona una carrera</label>
          <select id="carreraR" class="form-control mb-3" required>
            <option value="" disabled selected>Seleccione una opción...</option>
          </select>
        </div>

        <div class="col-4">
          <button type="submit" class="btn btn-primary btn-block">Enviar</button>
        </div>
      </form>

    </div>
    <!-- /.form-box -->
  </div><!-- /.card -->
</div>
<!-- /.register-box -->

<!-- jQuery -->
<script src="/plugins/jquery/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="/dist/js/adminlte.min.js"></script>

<script src="/dist/js/propios/crud-aspirante-ajax.js"></script>
<script src="/dist/js/propios/crud-carreras-ajax.js"></script>
<script>
  $( document ).ready(function () {
    //Function Query se manda a llamar
    //Cuando la pagina se cargo completamente
    //Se muestra
    listadoOpc();
  });
</script>
</body>
</html>
